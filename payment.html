<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cashivo — Add Funds</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-950" onload="init()">
  <header class="border-b bg-white dark:bg-slate-900">
    <div class="mx-auto max-w-3xl flex items-center justify-between p-4">
      <a href="/dashboard.html" class="font-semibold">Cashivo</a>
      <nav class="flex items-center gap-3 text-sm">
        <a href="/dashboard.html" class="text-sky-600">Dashboard</a>
        <button id="logout-btn" class="btn">Logout</button>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-3xl p-4">
    <div class="card p-4">
      <h2 class="text-lg font-semibold mb-3">Add Funds</h2>
      <form id="add-funds-form" class="flex gap-3 items-end">
        <div class="flex-1">
          <label class="label">Amount (INR)</label>
          <input name="amount" type="number" step="1" min="1" class="input" required />
        </div>
        <button class="btn" type="submit">Proceed to Pay</button>
      </form>
    </div>
  </main>

  <script type="module">
    import { requireAuth, initTheme } from './js/supabase.js';
    import { wirePaymentForm } from './js/payment.js';

    window.init = async () => {
      initTheme();
      await requireAuth('/index.html');
      wirePaymentForm();
    }
  </script>
</body>
</html>
