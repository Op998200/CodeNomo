<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cashivo — Add Transaction</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css?v=2" />
</head>
<body class="h-full bg-slate-50 dark:bg-slate-950" onload="init()">
  <header class="border-b bg-white dark:bg-slate-900">
    <div class="mx-auto max-w-3xl flex items-center justify-between p-4">
      <a href="/dashboard.html" class="font-semibold">Cashivo</a>
      <nav class="flex items-center gap-3 text-sm">
        <a href="/dashboard.html" class="text-sky-600">Dashboard</a>
        <button id="logout-btn" class="btn">Logout</button>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-3xl p-4">
    <div class="card p-4">
      <form id="tx-form" class="grid grid-cols-1 gap-3">
        <div>
          <label class="label">Title</label>
          <input name="title" class="input" placeholder="E.g., Salary for Aug" required />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label">Amount</label>
            <input name="amount" type="number" step="0.01" class="input" required />
          </div>
          <div>
            <label class="label">Type</label>
            <select name="type" class="input" required>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label">Category</label>
            <select name="category_id" id="category" class="input"></select>
          </div>
          <div>
            <label class="label">Date</label>
            <input name="date" type="date" class="input" value="" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label">Payment Method</label>
            <input name="payment_method" class="input" placeholder="UPI, Card, Cash" />
          </div>
          <div>
            <label class="label">Image (optional)</label>
            <input name="image_file" type="file" accept="image/*" class="input" />
          </div>
        </div>
        <div>
          <label class="label">Notes</label>
          <textarea name="notes" class="input" rows="3" placeholder="Add notes..."></textarea>
        </div>
        <button class="btn">Save</button>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script type="module">
    import { requireAuth, toast, initTheme } from './js/supabase.js?v=2';
    import { listCategories, autoCategorize, createTransaction } from './js/transactions.js?v=2';
    import { queueIfOffline, trySync } from './js/offline.js?v=2';

    window.init = async () => {
      initTheme();
      await requireAuth('/index.html');
      const catSelect = document.getElementById('category');
      const categories = await listCategories();
      catSelect.innerHTML = categories.map(c => `<option value="${c.id}">${c.name} (${c.type})</option>`).join('');
      document.querySelector('input[name="date"]').value = dayjs().format('YYYY-MM-DD');

      const titleInput = document.querySelector('input[name="title"]');
      const notesInput = document.querySelector('textarea[name="notes"]');
      const typeSelect = document.querySelector('select[name="type"]');
      const handleAuto = () => {
        const rule = autoCategorize({ title: titleInput.value, notes: notesInput.value });
        if (rule) {
          typeSelect.value = rule.type;
          const m = [...catSelect.options].find(o => o.textContent.toLowerCase().startsWith(rule.category.toLowerCase()));
          if (m) catSelect.value = m.value;
        }
      };
      titleInput.addEventListener('input', handleAuto);
      notesInput.addEventListener('input', handleAuto);

      const form = document.getElementById('tx-form');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const dto = Object.fromEntries(fd.entries());
        dto.amount = Number(dto.amount);
        dto.category_id = dto.category_id ? Number(dto.category_id) : null;
        dto.image_file = fd.get('image_file');
        try {
          // If offline, queue a safe payload (no files) and redirect
          const offlineDto = { ...dto };
          delete offlineDto.image_file;
          if (queueIfOffline('create-transaction', offlineDto)) {
            window.location.href = '/dashboard.html';
            return;
          }
          await createTransaction(dto);
          window.location.href = '/dashboard.html';
        } catch (err) { toast(err.message, 'error'); }
      });
    }
  </script>
</body>
</html>
