<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cashivo — Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css?v=2" />
</head>
<body class="h-full bg-slate-50 dark:bg-slate-950" onload="init()">
  <header class="border-b bg-white dark:bg-slate-900">
    <div class="mx-auto max-w-3xl flex items-center justify-between p-4">
      <a href="/dashboard.html" class="font-semibold">Cashivo</a>
      <nav class="flex items-center gap-3 text-sm">
        <a href="/dashboard.html" class="text-sky-600">Dashboard</a>
        <button id="logout-btn" class="btn">Logout</button>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-3xl p-4">
    <div class="card p-4">
      <h2 class="text-lg font-semibold mb-3">Your Profile</h2>
      <form id="profile-form" class="grid grid-cols-1 gap-3">
        <div>
          <label class="label">Full name</label>
          <input name="full_name" class="input" />
        </div>
        <div>
          <label class="label">Email</label>
          <input name="email" type="email" class="input" />
        </div>
        <div>
          <label class="label">Avatar</label>
          <input name="avatar" type="file" accept="image/*" class="input" />
        </div>
        <button class="btn">Save</button>
      </form>
    </div>
  </main>

  <script type="module">
    import { requireAuth, toast, initTheme } from './js/supabase.js';
    import { getProfile, updateProfile } from './js/auth.js';
    import { uploadImage } from './js/storage.js';

    window.init = async () => {
      initTheme();
      await requireAuth('/index.html');
      const form = document.getElementById('profile-form');
      const p = await getProfile();
      form.full_name.value = p.full_name || '';
      form.email.value = p.email || '';

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        let avatar_url = p.avatar_url;
        const file = fd.get('avatar');
        if (file && file.size) avatar_url = await uploadImage(file, 'avatars');
        try {
          await updateProfile({ full_name: fd.get('full_name'), email: fd.get('email'), avatar_url });
          toast('Profile updated', 'success');
        } catch (err) { toast(err.message, 'error'); }
      });
    }
  </script>
</body>
</html>
